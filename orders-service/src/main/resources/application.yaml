server:
  port: 8080

logging:
  pattern:
    level: "%5p [orderId=%X{orderId:-}]"

app:
  kafka:
    order-events-topic-name: order-events
    product-commands-topic-name: product-commands
    product-events-topic-name: product-events
    payment-commands-topic-name: payment-commands
    payment-events-topic-name: payment-events
    order-commands-topic-name: order-commands

spring:
  jackson:
    deserialization:
      fail-on-unknown-properties: true
  kafka:
    bootstrap-servers: localhost:9091,localhost:9092,localhost:9093
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JacksonJsonSerializer
      acks: all
      properties:
        delivery.timeout.ms: 120000
        linger.ms: 0
        request.timeout.ms: 30000
        max.in.flight.requests.per.connection: 5
        enable.idempotence: true
    consumer:
      group-id: orders-ms
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JacksonJsonDeserializer
      properties:
        spring.json.trusted.packages: com.appsdeveloperblog.core.*
